syntax = "proto3";

package transport;

// ─── Cluster Coordination ────────────────────────────────────────────────────

message NodeInfo {
    string id = 1;
    string name = 2;
    string host = 3;
    uint32 transport_port = 4;
    uint32 http_port = 5;
    repeated string roles = 6;  // "master", "data", "client"
}

message ShardAssignment {
    uint32 shard_id = 1;
    string node_id = 2;          // primary node
    repeated string replica_node_ids = 3; // replica nodes
}

message IndexMetadata {
    string name = 1;
    uint32 number_of_shards = 2;
    repeated ShardAssignment shards = 3;
    uint32 number_of_replicas = 4;
}

message ClusterState {
    string cluster_name = 1;
    uint64 version = 2;
    optional string master_node = 3;
    repeated NodeInfo nodes = 4;
    repeated IndexMetadata indices = 5;
}

message JoinRequest {
    NodeInfo node_info = 1;
    uint64 raft_node_id = 2;  // Joining node's unique Raft ID
}

message JoinResponse {
    ClusterState state = 1;
}

message PublishStateRequest {
    ClusterState state = 1;
}

message PingRequest {
    string source_node_id = 1;
}

message Empty {}

// ─── Shard-level Operations ──────────────────────────────────────────────────

message ShardDocRequest {
    string index_name = 1;
    uint32 shard_id = 2;
    bytes payload_json = 3;   // JSON document as bytes (avoids double-encode)
    string doc_id = 4;        // document _id
}

message ShardDocResponse {
    bool success = 1;
    string doc_id = 2;
    string error = 3;         // empty on success
}

message ShardDeleteRequest {
    string index_name = 1;
    uint32 shard_id = 2;
    string doc_id = 3;
}

message ShardDeleteResponse {
    bool success = 1;
    uint64 deleted = 2;
    string error = 3;
}

message ShardGetRequest {
    string index_name = 1;
    uint32 shard_id = 2;
    string doc_id = 3;
}

message ShardGetResponse {
    bool found = 1;
    bytes source_json = 2;    // _source as JSON bytes (empty if not found)
    string error = 3;
}

message ShardBulkRequest {
    string index_name = 1;
    uint32 shard_id = 2;
    repeated bytes documents_json = 3; // each element is a JSON doc as bytes
}

message ShardBulkResponse {
    bool success = 1;
    repeated string doc_ids = 2;
    string error = 3;
}

message ShardSearchRequest {
    string index_name = 1;
    uint32 shard_id = 2;
    string query = 3;         // simple query string for q= searches
}

message ShardSearchDslRequest {
    string index_name = 1;
    uint32 shard_id = 2;
    bytes search_request_json = 3; // SearchRequest serialized as JSON bytes
}

message SearchHit {
    bytes source_json = 1;    // _source document as JSON bytes
}

message ShardSearchResponse {
    bool success = 1;
    repeated SearchHit hits = 2;
    string error = 3;
    uint64 total_hits = 4;
}

// ─── Replication ──────────────────────────────────────────────────────────────

message ReplicateDocRequest {
    string index_name = 1;
    uint32 shard_id = 2;
    string doc_id = 3;
    bytes payload_json = 4;   // document body as JSON bytes
    string op = 5;            // "index" or "delete"
    uint64 seq_no = 6;        // monotonic sequence number from primary WAL
}

message ReplicateDocResponse {
    bool success = 1;
    string error = 2;
    uint64 local_checkpoint = 3;  // replica's highest contiguous seq_no after apply
}

message ReplicateBulkRequest {
    string index_name = 1;
    uint32 shard_id = 2;
    repeated ReplicateDocRequest ops = 3;
}

message ReplicateBulkResponse {
    bool success = 1;
    string error = 2;
    uint64 local_checkpoint = 3;  // replica's highest contiguous seq_no after bulk apply
}

// ─── Replica Recovery ───────────────────────────────────────────────────────

message RecoverReplicaRequest {
    string index_name = 1;
    uint32 shard_id = 2;
    uint64 local_checkpoint = 3;  // replica's highest seq_no — primary replays from here
}

message RecoverReplicaResponse {
    bool success = 1;
    string error = 2;
    uint64 ops_replayed = 3;      // number of operations sent to the replica
    uint64 primary_checkpoint = 4; // primary's current seq_no after replay
    repeated RecoverReplicaOp operations = 5; // the actual translog entries for replay
}

// A single operation in a recovery response (matches translog entry).
message RecoverReplicaOp {
    uint64 seq_no = 1;
    string op = 2;           // "index" or "delete"
    string doc_id = 3;
    bytes payload_json = 4;  // document body
}

// ─── Raft Consensus ─────────────────────────────────────────────────────────

// Generic Raft RPCs — payloads are JSON-encoded openraft messages.
// This avoids duplicating openraft's complex type hierarchy in protobuf.

message RaftRequest {
    bytes data = 1;   // JSON-serialized openraft request
}

message RaftReply {
    bytes data = 1;   // JSON-serialized openraft response
    string error = 2; // non-empty on failure
}

// ─── Dynamic Settings ───────────────────────────────────────────────────────

message UpdateSettingsRequest {
    string index_name = 1;
    bytes settings_json = 2;  // JSON-encoded settings body (same as PUT /_settings body)
}

message UpdateSettingsResponse {
    bool acknowledged = 1;
    string error = 2;         // non-empty on failure
}

// ─── Index Management (forwarded to leader) ─────────────────────────────────

message CreateIndexRequest {
    string index_name = 1;
    bytes body_json = 2;      // JSON-encoded create index body (settings + mappings)
}

message CreateIndexResponse {
    bool acknowledged = 1;
    string error = 2;         // non-empty on failure
    bytes response_json = 3;  // JSON-encoded response body
}

message DeleteIndexRequest {
    string index_name = 1;
}

message DeleteIndexResponse {
    bool acknowledged = 1;
    string error = 2;         // non-empty on failure
}

message TransferMasterRequest {
    string target_node_id = 1;  // node name to transfer leadership to
}

message TransferMasterResponse {
    bool acknowledged = 1;
    string error = 2;
}

// ─── Shard Stats (for _cat endpoints) ───────────────────────────────────────

message ShardStatsRequest {}

message ShardStat {
    string index_name = 1;
    uint32 shard_id = 2;
    uint64 doc_count = 3;
}

message ShardStatsResponse {
    repeated ShardStat shards = 1;
}

// ─── Service Definition ─────────────────────────────────────────────────────

service InternalTransport {
    // Cluster coordination (legacy — kept for backward compat during migration)
    rpc JoinCluster(JoinRequest) returns (JoinResponse);
    rpc PublishState(PublishStateRequest) returns (Empty);
    rpc Ping(PingRequest) returns (Empty);

    // Shard-level document operations
    rpc IndexDoc(ShardDocRequest) returns (ShardDocResponse);
    rpc BulkIndex(ShardBulkRequest) returns (ShardBulkResponse);
    rpc DeleteDoc(ShardDeleteRequest) returns (ShardDeleteResponse);
    rpc GetDoc(ShardGetRequest) returns (ShardGetResponse);

    // Shard-level search
    rpc SearchShard(ShardSearchRequest) returns (ShardSearchResponse);
    rpc SearchShardDsl(ShardSearchDslRequest) returns (ShardSearchResponse);

    // Primary-to-replica replication
    rpc ReplicateDoc(ReplicateDocRequest) returns (ReplicateDocResponse);
    rpc ReplicateBulk(ReplicateBulkRequest) returns (ReplicateBulkResponse);

    // Replica recovery: replica sends its checkpoint, primary replays translog
    rpc RecoverReplica(RecoverReplicaRequest) returns (RecoverReplicaResponse);

    // Dynamic settings (forwarded to leader)
    rpc UpdateSettings(UpdateSettingsRequest) returns (UpdateSettingsResponse);

    // Index management (forwarded to leader)
    rpc CreateIndex(CreateIndexRequest) returns (CreateIndexResponse);
    rpc DeleteIndex(DeleteIndexRequest) returns (DeleteIndexResponse);

    // Cluster management (forwarded to leader)
    rpc TransferMaster(TransferMasterRequest) returns (TransferMasterResponse);

    // Shard stats (for _cat endpoints)
    rpc GetShardStats(ShardStatsRequest) returns (ShardStatsResponse);

    // Raft consensus RPCs
    rpc RaftVote(RaftRequest) returns (RaftReply);
    rpc RaftAppendEntries(RaftRequest) returns (RaftReply);
    rpc RaftSnapshot(RaftRequest) returns (RaftReply);
}
